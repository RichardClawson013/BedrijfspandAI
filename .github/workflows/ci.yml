name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build:web

      - name: Playwright chromium installeren
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - name: Screenshots als artifact bewaren
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: test-results/screenshots/
          retention-days: 90

      - name: gitleaks installeren
        run: |
          curl -sL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: gitleaks scan (werkboom + historie)
        run: gitleaks detect --source . -v --redact
