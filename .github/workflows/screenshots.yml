name: Screenshots

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build:web
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

      - name: Screenshots bijwerken in docs/
        run: |
          mkdir -p docs/screenshots
          cp test-results/screenshots/*.png docs/screenshots/

      - name: gitleaks installeren
        run: |
          curl -sL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Committen naar aparte, onbeschermde screenshots-branch
        run: |
          # master heeft branch protection (PR + review vereist voor niet-admins) —
          # de bot mag daar dus terecht niet direct naar pushen. Screenshots gaan
          # naar een losse, onbeschermde branch die master + de nieuwe PNG's
          # weerspiegelt; de README verwijst naar het raw-content-adres daarvan.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B screenshots
          git add docs/screenshots
          if ! git diff --cached --quiet; then
            git commit -m "chore: screenshots automatisch bijgewerkt [skip ci]"
            git push --force origin screenshots
          fi
